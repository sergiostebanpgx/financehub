services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_db
    volumes:
      - expense_data:/var/lib/postgresql/data

volumes:
  expense_data:
